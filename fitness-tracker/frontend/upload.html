<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
  <title>Upload — Fitness Tracker</title>
  <link rel="manifest" href="/manifest.json">
  <meta name="theme-color" content="#4f8ef7">
  <link rel="stylesheet" href="/static/css/app.css">
</head>
<body>

<nav class="bottom-nav">
  <a href="/" class="nav-item"><svg viewBox="0 0 24 24" fill="currentColor"><path d="M3 13h8V3H3v10zm0 8h8v-6H3v6zm10 0h8V11h-8v10zm0-18v6h8V3h-8z"/></svg><span class="nav-label">Dashboard</span></a>
  <a href="/activities" class="nav-item"><svg viewBox="0 0 24 24" fill="currentColor"><path d="M13.49 5.48c1.1 0 2-.9 2-2s-.9-2-2-2-2 .9-2 2 .9 2 2 2zm-3.6 13.9l1-4.4 2.1 2v6h2v-7.5l-2.1-2 .6-3c1.3 1.5 3.3 2.5 5.5 2.5v-2c-1.9 0-3.5-1-4.3-2.4l-1-1.6c-.4-.6-1-1-1.7-1-.3 0-.5.1-.8.1l-5.2 2.2v4.7h2v-3.4l1.8-.7-1.6 8.1-4.9-1-.4 2 7 1.4z"/></svg><span class="nav-label">Activities</span></a>
  <a href="/health" class="nav-item"><svg viewBox="0 0 24 24" fill="currentColor"><path d="M12 21.35l-1.45-1.32C5.4 15.36 2 12.28 2 8.5 2 5.42 4.42 3 7.5 3c1.74 0 3.41.81 4.5 2.09C13.09 3.81 14.76 3 16.5 3 19.58 3 22 5.42 22 8.5c0 3.78-3.4 6.86-8.55 11.54L12 21.35z"/></svg><span class="nav-label">Health</span></a>
  <a href="/stats" class="nav-item"><svg viewBox="0 0 24 24" fill="currentColor"><path d="M19 3H5c-1.1 0-2 .9-2 2v14c0 1.1.9 2 2 2h14c1.1 0 2-.9 2-2V5c0-1.1-.9-2-2-2zm-7 14H7v-2h5v2zm5-4H7v-2h10v2zm0-4H7V7h10v2z"/></svg><span class="nav-label">Stats</span></a>
  <a href="/upload" class="nav-item active"><svg viewBox="0 0 24 24" fill="currentColor"><path d="M19.35 10.04C18.67 6.59 15.64 4 12 4 9.11 4 6.6 5.64 5.35 8.04 2.34 8.36 0 10.91 0 14c0 3.31 2.69 6 6 6h13c2.76 0 5-2.24 5-5 0-2.64-2.05-4.78-4.65-4.96zM14 13v4h-4v-4H7l5-5 5 5h-3z"/></svg><span class="nav-label">Upload</span></a>
</nav>

<main class="page">
  <div class="page-header">
    <div>
      <div class="page-title">Import Data</div>
      <div class="page-subtitle">Upload exports from Mi Fitness or Runkeeper</div>
    </div>
  </div>

  <div id="result-box"></div>

  <!-- Mi Fitness upload -->
  <div class="card">
    <div class="card-title">📱 Mi Fitness (Redmi Watch)</div>
    <p style="font-size:13px;color:var(--text-muted);margin-bottom:12px">
      In Mi Fitness app: Profile → Settings → Export Data → Download ZIP
    </p>
    <label class="upload-zone" id="mf-zone">
      <input type="file" id="mf-file" accept=".zip">
      <div class="icon">🗜️</div>
      <div class="label">Tap to select Mi Fitness ZIP</div>
      <div class="hint" id="mf-filename">or drag and drop here</div>
    </label>
    <div class="progress-bar" id="mf-progress-wrap" style="display:none">
      <div class="progress-fill" id="mf-progress" style="width:0%"></div>
    </div>
    <button class="btn btn-primary btn-full" id="mf-btn" onclick="uploadFile('mi-fitness')">Upload &amp; Import</button>
  </div>

  <!-- Runkeeper upload -->
  <div class="card">
    <div class="card-title">🏃 Runkeeper</div>
    <p style="font-size:13px;color:var(--text-muted);margin-bottom:12px">
      In Runkeeper app or web: Settings → Export Data → Request Data Export → Download ZIP
    </p>
    <label class="upload-zone" id="rk-zone">
      <input type="file" id="rk-file" accept=".zip">
      <div class="icon">🗜️</div>
      <div class="label">Tap to select Runkeeper ZIP</div>
      <div class="hint" id="rk-filename">or drag and drop here</div>
    </label>
    <div class="progress-bar" id="rk-progress-wrap" style="display:none">
      <div class="progress-fill" id="rk-progress" style="width:0%"></div>
    </div>
    <button class="btn btn-primary btn-full" id="rk-btn" onclick="uploadFile('runkeeper')">Upload &amp; Import</button>
  </div>
</main>

<script src="/static/js/api.js"></script>
<script src="/static/js/upload.js"></script>
</body>
</html>
